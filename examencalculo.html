<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Kahoot: Cálculo Integral</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.7/MathJax.js?config=TeX-MML-AM_CHTML"></script>
    <style>
        :root {
            --kahoot-purple: #46178f;
            --red: #e21b3c;
            --blue: #1368ce;
            --yellow: #d89e00;
            --green: #26890c;
            --bg-light: #f2f2f2;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg-light); }
        
        /* Contenedores */
        #app { max-width: 900px; margin: 0 auto; padding: 20px; }
        .screen { display: none; text-align: center; }
        .active { display: block; }

        /* Estilo Kahoot */
        .login-box { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 50px; }
        input { width: 80%; padding: 15px; margin: 20px 0; border: 2px solid #ccc; border-radius: 5px; font-size: 1.2rem; }
        .btn-main { background: var(--kahoot-purple); color: white; padding: 15px 40px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }

        /* Grid de Preguntas */
        .question-text { font-size: 1.8rem; font-weight: bold; margin: 30px 0; background: white; padding: 30px; border-radius: 10px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option-btn { border: none; border-radius: 10px; padding: 40px 20px; font-size: 1.4rem; color: white; font-weight: bold; cursor: pointer; transition: transform 0.1s; position: relative; }
        .option-btn:active { transform: scale(0.95); }
        .opt-0 { background: var(--red); }
        .opt-1 { background: var(--blue); }
        .opt-2 { background: var(--yellow); }
        .opt-3 { background: var(--green); }
        
        /* Bloqueo */
        #block-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }

        /* Impresión */
        @media print {
            body { background: white; }
            #app, #block-screen { display: none !important; }
            #print-report { display: block !important; padding: 20px; color: black; }
            .report-q { border-bottom: 1px solid #ccc; padding: 10px 0; page-break-inside: avoid; }
            .correct { color: green; font-weight: bold; }
            .incorrect { color: red; text-decoration: line-through; }
        }
        #print-report { display: none; }
    </style>
</head>
<body>

    <div id="block-screen">
        <h1>⚠️ EXAMEN BLOQUEADO</h1>
        <p>Intentaste cambiar de página o salir de la ventana. Por seguridad, tu examen ha sido anulado.</p>
    </div>

    <div id="app">
        <div id="screen-login" class="screen active">
            <div class="login-box">
                <h1 style="color: var(--kahoot-purple)">Examen de Integrales</h1>
                <p>Tema: Funciones Trigonométricas (Sustitución)</p>
                <input type="text" id="student-name" placeholder="Nombre completo del alumno" autocomplete="off">
                <br>
                <button class="btn-main" onclick="initQuiz()">COMENZAR EXAMEN</button>
            </div>
        </div>

        <div id="screen-quiz" class="screen">
            <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px;">
                <span id="name-display"></span>
                <span id="timer-display">Tiempo: 00:00</span>
                <span id="progress-display">1/5</span>
            </div>
            <div class="question-text" id="q-container">
                </div>
            <div class="options-grid" id="options-container">
                </div>
        </div>

        <div id="screen-results" class="screen">
            <div class="login-box">
                <h2>¡Examen Terminado!</h2>
                <h1 id="final-score" style="font-size: 4rem;">0 / 5</h1>
                <p id="total-time"></p>
                <button class="btn-main" style="background: var(--green);" onclick="window.print()">GENERAR PDF PARA ENVÍO</button>
            </div>
        </div>
    </div>

    <div id="print-report">
        <h1 style="text-align: center;">Reporte de Evaluación: Cálculo Integral</h1>
        <hr>
        <div id="print-header"></div>
        <div id="print-questions"></div>
    </div>

<script>
    const db = [
        { id: 1, f: "\\int \\sin(8x) dx", r: "-\\frac{1}{8}\\cos 8x + C", d: ["\\frac{1}{8}\\cos 8x + C", "-8\\cos 8x + C", "-\\frac{1}{8}\\sin 8x + C"] },
        { id: 2, f: "\\int \\cos(3x+1) dx", r: "\\frac{1}{3}\\sin(3x+1) + C", d: ["-\\frac{1}{3}\\sin(3x+1) + C", "3\\sin(3x+1) + C", "\\frac{1}{3}\\cos(3x+1) + C"] },
        { id: 3, f: "\\int \\sin(\\frac{x}{3}) dx", r: "-3\\cos(\\frac{x}{3}) + C", d: ["-\\frac{1}{3}\\cos(\\frac{x}{3}) + C", "3\\cos(\\frac{x}{3}) + C", "-3\\sin(\\frac{x}{3}) + C"] },
        { id: 4, f: "\\int \\cos(\\frac{3x}{2}) dx", r: "\\frac{2}{3}\\sin(\\frac{3x}{2}) + C", d: ["\\frac{3}{2}\\sin(\\frac{3x}{2}) + C", "-\\frac{2}{3}\\sin(\\frac{3x}{2}) + C", "\\frac{2}{3}\\cos(\\frac{3x}{2}) + C"] },
        { id: 5, f: "\\int \\sec^2(4x) dx", r: "\\frac{1}{4}\\tan 4x + C", d: ["4\\tan 4x + C", "-\\frac{1}{4}\\tan 4x + C", "\\frac{1}{4}\\sec 4x + C"] },
        { id: 6, f: "\\int \\csc^2(\\frac{1}{2}x) dx", r: "-2\\cot(\\frac{x}{2}) + C", d: ["2\\cot(\\frac{x}{2}) + C", "-\\frac{1}{2}\\cot(\\frac{x}{2}) + C", "-2\\csc(\\frac{x}{2}) + C"] },
        { id: 7, f: "\\int \\sec(2x+3)\\tan(2x+3) dx", r: "\\frac{1}{2}\\sec(2x+3) + C", d: ["\\frac{1}{2}\\tan(2x+3) + C", "2\\sec(2x+3) + C", "-\\frac{1}{2}\\sec(2x+3) + C"] },
        { id: 8, f: "\\int \\csc(1-x)\\cot(1-x) dx", r: "\\csc(1-x) + C", d: ["-\\csc(1-x) + C", "\\cot(1-x) + C", "-1\\csc(1-x) + C"] },
        { id: 9, f: "\\int \\cos(a-bx) dx", r: "-\\frac{1}{b}\\sin(a-bx) + C", d: ["\\frac{1}{b}\\sin(a-bx) + C", "-b\\sin(a-bx) + C", "-\\frac{1}{b}\\cos(a-bx) + C"] },
        { id: 10, f: "\\int \\sin(\\sqrt{x}) \\frac{dx}{\\sqrt{x}}", r: "-2\\cos\\sqrt{x} + C", d: ["2\\cos\\sqrt{x} + C", "-\\frac{1}{2}\\cos\\sqrt{x} + C", "-2\\sin\\sqrt{x} + C"] },
        { id: 11, f: "\\int \\sec(\\frac{1}{x})\\tan(\\frac{1}{x}) \\frac{dx}{x^2}", r: "-\\sec(\\frac{1}{x}) + C", d: ["\\sec(\\frac{1}{x}) + C", "-\\tan(\\frac{1}{x}) + C", "-x\\sec(\\frac{1}{x}) + C"] },
        { id: 12, f: "\\int \\cos(\\frac{3}{x}) \\frac{dx}{x^2}", r: "-\\frac{1}{3}\\sin(\\frac{3}{x}) + C", d: ["\\frac{1}{3}\\sin(\\frac{3}{x}) + C", "-3\\sin(\\frac{3}{x}) + C", "-\\frac{1}{3}\\cos(\\frac{3}{x}) + C"] },
        { id: 13, f: "\\int \\sin(3x^2-2x)(3x-1) dx", r: "-\\frac{1}{2}\\cos(3x^2-2x) + C", d: ["\\frac{1}{2}\\cos(3x^2-2x) + C", "-2\\cos(3x^2-2x) + C", "-\\frac{1}{2}\\sin(3x^2-2x) + C"] },
        { id: 14, f: "\\int \\cos(x^3+1) x^2 dx", r: "\\frac{1}{3}\\sin(x^3+1) + C", d: ["3\\sin(x^3+1) + C", "-\\frac{1}{3}\\sin(x^3+1) + C", "\\frac{1}{3}\\cos(x^3+1) + C"] },
        { id: 15, f: "\\int \\sec^2\\sqrt{x} \\frac{dx}{\\sqrt{x}}", r:  "2\\tan\\sqrt{x} + C", d: ["\\frac{1}{2}\\tan\\sqrt{x} + C", "-2\\tan\\sqrt{x} + C", "2\\sec\\sqrt{x} + C"] },
        { id: 16, f: "\\int \\csc^2(e^x) e^x dx", r: "-\\cot(e^x) + C", d: ["\\cot(e^x) + C", "-e^x\\cot(e^x) + C", "-\\csc(e^x) + C"] },
        { id: 17, f: "\\int \\csc^2(2x-1) dx", r: "-\\frac{1}{2}\\cot(2x-1) + C", d: ["\\frac{1}{2}\\cot(2x-1) + C", "-2\\cot(2x-1) + C", "-\\frac{1}{2}\\csc(2x-1) + C"] },
        { id: 18, f: "\\int (\\sin \\frac{x}{2} + \\cos \\frac{x}{2})^2 dx", r: "x - \\cos x + C", d: ["x + \\cos x + C", "x - \\sin x + C", "\\frac{x}{2} - \\cos x + C"] },
        { id: 19, f: "\\int \\sin(2x) dx", r: "-\\frac{1}{2}\\cos 2x + C", d: ["\\frac{1}{2}\\cos 2x + C", "-2\\cos 2x + C", "-\\frac{1}{2}\\sin 2x + C"] },
        { id: 20, f: "\\int \\cos(4x) dx", r: "\\frac{1}{4}\\sin 4x + C", d: ["-\\frac{1}{4}\\sin 4x + C", "4\\sin 4x + C", "\\frac{1}{4}\\cos 4x + C"] }
    ];

    let currentQ = 0;
    let score = 0;
    let startTime, endTime;
    let studentName = "";
    let selectedQuestions = [];
    let studentAnswers = [];
    let timerInterval;

    // Bloqueo por cambio de pestaña
    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'hidden' && studentName !== "") {
            lockQuiz();
        }
    });

    function lockQuiz() {
        document.getElementById('block-screen').style.display = 'flex';
        clearInterval(timerInterval);
    }

    function initQuiz() {
        studentName = document.getElementById('student-name').value.trim();
        if (studentName === "") return alert("Ingresa tu nombre");

        // Checar si ya lo hizo
        if (localStorage.getItem("quiz_" + studentName)) {
            return alert("Este alumno ya ha realizado el examen.");
        }

        selectedQuestions = db.sort(() => 0.5 - Math.random()).slice(0, 5);
        document.getElementById('name-display').innerText = "Alumno: " + studentName;
        document.getElementById('screen-login').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');
        
        startTime = new Date();
        startTimer();
        renderQuestion();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            let now = new Date();
            let diff = Math.floor((now - startTime) / 1000);
            let m = Math.floor(diff / 60).toString().padStart(2, '0');
            let s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `Tiempo: ${m}:${s}`;
        }, 1000);
    }

    function renderQuestion() {
        let q = selectedQuestions[currentQ];
        document.getElementById('progress-display').innerText = `${currentQ + 1} / 5`;
        document.getElementById('q-container').innerHTML = `Resolver: <br> $$${q.f}$$`;
        
        let options = [...q.d, q.r].sort(() => 0.5 - Math.random());
        let container = document.getElementById('options-container');
        container.innerHTML = "";

        options.forEach((opt, i) => {
            let btn = document.createElement('button');
            btn.className = `option-btn opt-${i}`;
            btn.innerHTML = `$$${opt}$$`;
            btn.onclick = () => checkAnswer(opt);
            container.appendChild(btn);
        });
        
        MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
    }

    function checkAnswer(ans) {
        let q = selectedQuestions[currentQ];
        studentAnswers.push(ans);
        if (ans === q.r) score++;

        currentQ++;
        if (currentQ < 5) {
            renderQuestion();
        } else {
            finishQuiz();
        }
    }

    function finishQuiz() {
        endTime = new Date();
        clearInterval(timerInterval);
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-results').classList.add('active');
        document.getElementById('final-score').innerText = `${score} / 5`;
        
        let timeStr = document.getElementById('timer-display').innerText;
        document.getElementById('total-time').innerText = timeStr;

        // Guardar en local para bloquear repetición
        localStorage.setItem("quiz_" + studentName, score);
        
        buildPrintReport();
    }

    function buildPrintReport() {
        let header = `
            <p><strong>Alumno:</strong> ${studentName}</p>
            <p><strong>Aciertos:</strong> ${score} de 5</p>
            <p><strong>Inicio:</strong> ${startTime.toLocaleTimeString()}</p>
            <p><strong>Término:</strong> ${endTime.toLocaleTimeString()}</p>
        `;
        document.getElementById('print-header').innerHTML = header;

        let qs = "";
        selectedQuestions.forEach((q, i) => {
            let sAns = studentAnswers[i];
            let status = (sAns === q.r) ? "✅ Correcta" : "❌ Incorrecta";
            qs += `
                <div class="report-q">
                    <p><strong>Pregunta ${i+1}:</strong> $${q.f}$</p>
                    <p>Tu respuesta: <span class="${sAns === q.r ? 'correct' : 'incorrect'}">$${sAns}$</span></p>
                    <p>Respuesta correcta: <span class="correct">$${q.r}$</span></p>
                    <p><em>${status}</em></p>
                </div>
            `;
        });
        document.getElementById('print-questions').innerHTML = qs;
        MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
    }
</script>
</body>
</html>
