<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Redes de Computadoras</title>
    <style>
        /* ================= ESTILOS GENERALES Y KAHOOT ================= */
        :root {
            --red: #e21b3c;
            --blue: #1368ce;
            --yellow: #d89e00;
            --green: #26890c;
            --bg-color: #f2f2f2;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        #app {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Pantallas */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .screen.active { display: flex; }

        /* Login */
        .login-box {
            background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center; width: 100%; max-width: 400px;
        }
        .login-box input {
            width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ccc; border-radius: 5px;
            font-size: 16px; box-sizing: border-box;
        }
        .btn-start {
            background: var(--blue); color: white; border: none; padding: 15px 30px; font-size: 18px;
            font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; transition: background 0.3s;
        }
        .btn-start:hover { background: #0f52a3; }

        /* Cabecera del Examen */
        .header {
            display: flex; justify-content: space-between; width: 100%; padding: 10px 20px;
            background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px;
            font-weight: bold; box-sizing: border-box;
        }

        /* Pregunta */
        .question-container {
            background: white; padding: 30px; border-radius: 10px; text-align: center;
            font-size: 24px; font-weight: bold; margin-bottom: 20px; width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box;
        }

        /* Opciones (Estilo Kahoot) */
        .options-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;
        }
        @media (max-width: 600px) { .options-grid { grid-template-columns: 1fr; } }
        
        .option-btn {
            color: white; border: none; padding: 30px 20px; font-size: 20px; font-weight: bold;
            border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2); transition: transform 0.1s, filter 0.2s;
            text-align: center; word-break: break-word;
        }
        .option-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 0px 0px rgba(0,0,0,0.2); }
        .option-btn:disabled { cursor: not-allowed; filter: brightness(0.7); }
        
        .opt-0 { background-color: var(--red); }
        .opt-1 { background-color: var(--blue); }
        .opt-2 { background-color: var(--yellow); }
        .opt-3 { background-color: var(--green); }

        .correct-anim { animation: flashGreen 1s; }
        .wrong-anim { animation: flashRed 1s; }

        @keyframes flashGreen { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5) drop-shadow(0 0 10px green); } }
        @keyframes flashRed { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(0.5) drop-shadow(0 0 10px red); } }

        /* Resultados */
        .results-box {
            background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center; width: 100%;
        }
        .score-text { font-size: 48px; font-weight: bold; color: var(--blue); margin: 20px 0; }
        .time-text { font-size: 18px; color: #555; margin-bottom: 30px; }

        /* ================= ESTILOS DE IMPRESIÓN (PDF) ================= */
        #print-area { display: none; }
        
        @media print {
            body { background: white; color: black; font-size: 12pt; }
            #app { display: none !important; }
            #print-area { display: block !important; padding: 0; margin: 0; }
            
            .print-header { 
                border-bottom: 2px solid black; padding-bottom: 10px; margin-bottom: 20px; text-align: center;
            }
            .print-header h1 { margin: 0 0 10px 0; font-size: 18pt; }
            .print-info { 
                display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; font-size: 11pt;
            }
            
            .print-question { 
                page-break-inside: avoid; margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 5px;
            }
            .print-q-title { font-weight: bold; margin-bottom: 5px; }
            .print-opt { margin-left: 20px; font-size: 11pt; }
            .print-opt.correct { color: green; font-weight: bold; }
            .print-opt.wrong { color: red; text-decoration: line-through; }
            .print-opt.user-correct { color: green; font-weight: bold; }
            
            /* Ajustes para forzar máximo 2 hojas */
            @page { margin: 1.5cm; }
            .print-question { padding: 5px 10px; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <div id="app">
        <div id="screen-login" class="screen active">
            <div class="login-box">
                <h2>Evaluación de Redes</h2>
                <p>Ingresa tu nombre completo para comenzar. El examen no se puede pausar ni repetir.</p>
                <input type="text" id="student-name" placeholder="Nombre completo" autocomplete="off">
                <button class="btn-start" onclick="startExam()">Ingresar al Examen</button>
            </div>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="header">
                <span id="display-name">Alumno: </span>
                <span id="display-progress">Pregunta: 1/10</span>
            </div>
            <div class="question-container" id="question-text">
                Cargando pregunta...
            </div>
            <div class="options-grid" id="options-container">
                </div>
        </div>

        <div id="screen-results" class="screen">
            <div class="results-box">
                <h2>¡Examen Finalizado!</h2>
                <div class="score-text" id="final-score">0 / 10</div>
                <div class="time-text">
                    <p><strong>Inicio:</strong> <span id="time-start"></span></p>
                    <p><strong>Término:</strong> <span id="time-end"></span></p>
                </div>
                <button class="btn-start" style="background: var(--green);" onclick="window.print()">Generar PDF / Enviar por Correo</button>
            </div>
        </div>
    </div>

    <div id="print-area"></div>

    <script>
        // ================= BASE DE DATOS DE PREGUNTAS =================
        const questions = [
            {
                q: "Red de computadoras que abarca un área geográfica pequeña, como un hogar, una oficina o un edificio escolar.",
                options: ["WAN (Wide Area Network)", "LAN (Local Area Network)", "MAN (Metropolitan Area Network)", "PAN (Personal Area Network)"],
                correct: 1
            },
            {
                q: "Red de telecomunicaciones que se extiende sobre un área geográfica extensa, conectando múltiples redes locales a lo largo de ciudades o países.",
                options: ["LAN (Local Area Network)", "MAN (Metropolitan Area Network)", "WLAN (Wireless LAN)", "WAN (Wide Area Network)"],
                correct: 3
            },
            {
                q: "Red de alta velocidad que cubre un área geográfica más extensa que un campus, pero menor que una red amplia, por ejemplo, conectando sucursales dentro de una misma ciudad.",
                options: ["MAN (Metropolitan Area Network)", "SAN (Storage Area Network)", "LAN (Local Area Network)", "VPN (Virtual Private Network)"],
                correct: 0
            },
            {
                q: "Protocolo fundamental de Internet que proporciona una dirección lógica, única e irrepetible a cada dispositivo para que pueda comunicarse en la red.",
                options: ["Dirección MAC", "Protocolo HTTP", "Dirección IP", "Protocolo FTP"],
                correct: 2
            },
            {
                q: "Sistema encargado de traducir nombres de dominio legibles por humanos (ej. www.google.com) a direcciones numéricas comprensibles para las computadoras.",
                options: ["DHCP", "DNS (Domain Name System)", "Puerta de enlace (Gateway)", "Máscara de subred"],
                correct: 1
            },
            {
                q: "Modelo conceptual de 7 capas creado por la ISO que estandariza las funciones de un sistema de telecomunicaciones o computación.",
                options: ["Modelo TCP/IP", "Modelo ARPANET", "Modelo IEEE 802", "Modelo OSI"],
                correct: 3
            },
            {
                q: "En una topología de red, es cualquier dispositivo físico conectado (computadora, impresora, router) capaz de crear, recibir o transmitir información.",
                options: ["Nodo", "Cable UTP", "Paquete de datos", "Ancho de banda"],
                correct: 0
            },
            {
                q: "Computadora o dispositivo conectado a una red que provee y/o utiliza servicios, y que tiene asignada una dirección de red específica.",
                options: ["Switch", "Host (Anfitrión)", "Hub", "Medio de transmisión"],
                correct: 1
            },
            {
                q: "Arquitectura de red descentralizada donde todos los dispositivos se comportan como iguales, actuando simultáneamente como clientes y servidores.",
                options: ["Modelo Cliente-Servidor", "Topología en Estrella", "Red P2P (Peer-to-Peer)", "Red Jerárquica"],
                correct: 2
            },
            {
                q: "Arquitectura donde un equipo centralizado de alta capacidad provee recursos, datos o servicios a múltiples dispositivos periféricos que los solicitan.",
                options: ["Topología de Anillo", "Modelo Cliente-Servidor", "Red P2P", "Topología de Bus"],
                correct: 1
            }
        ];

        // ================= VARIABLES DE ESTADO =================
        let studentName = "";
        let currentQuestion = 0;
        let score = 0;
        let startTime = null;
        let endTime = null;
        let userAnswers = []; // Guarda el índice de la opción elegida por el alumno

        // ================= LÓGICA DEL EXAMEN =================
        
        function formatTime(date) {
            return date.toLocaleDateString() + ' ' + date.toLocaleTimeString();
        }

        function startExam() {
            const nameInput = document.getElementById("student-name").value.trim();
            if (nameInput === "") {
                alert("Por favor, ingresa tu nombre completo.");
                return;
            }

            const storageKey = 'examen_redes_' + nameInput.toLowerCase().replace(/\s/g, '');
            
            // Verificación Anti-trampas
            if (localStorage.getItem(storageKey)) {
                alert("El sistema registra que ya has presentado este examen. No es posible repetirlo.");
                return;
            }

            // Iniciar
            studentName = nameInput;
            startTime = new Date();
            
            // Marcar en localStorage inmediatamente para evitar que recarguen la página
            localStorage.setItem(storageKey, 'iniciado_' + startTime.getTime());

            document.getElementById("display-name").innerText = "Alumno: " + studentName;
            
            document.getElementById("screen-login").classList.remove("active");
            document.getElementById("screen-quiz").classList.add("active");

            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById("display-progress").innerText = `Pregunta: ${currentQuestion + 1} / 10`;
            document.getElementById("question-text").innerText = q.q;

            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = ""; // Limpiar

            q.options.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = `option-btn opt-${index}`;
                btn.innerText = opt;
                btn.onclick = () => selectAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        function selectAnswer(selectedIndex, btnElement) {
            // 1. Bloquear todos los botones inmediatamente
            const allButtons = document.querySelectorAll('.option-btn');
            allButtons.forEach(btn => btn.disabled = true);

            // 2. Evaluar y guardar
            const correctIndex = questions[currentQuestion].correct;
            userAnswers.push(selectedIndex);

            if (selectedIndex === correctIndex) {
                score++;
                btnElement.classList.add("correct-anim");
            } else {
                btnElement.classList.add("wrong-anim");
                // Resaltar la correcta brevemente
                allButtons[correctIndex].style.filter = "brightness(1.5) drop-shadow(0 0 10px green)";
            }

            // 3. Pasar a la siguiente pregunta tras 1.5 segundos
            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < questions.length) {
                    loadQuestion();
                } else {
                    finishExam();
                }
            }, 1500);
        }

        function finishExam() {
            endTime = new Date();
            const storageKey = 'examen_redes_' + studentName.toLowerCase().replace(/\s/g, '');
            
            // Actualizar status final en LocalStorage
            localStorage.setItem(storageKey, 'finalizado_score_' + score);

            // Actualizar UI
            document.getElementById("screen-quiz").classList.remove("active");
            document.getElementById("screen-results").classList.add("active");

            document.getElementById("final-score").innerText = `${score} / 10 Aciertos`;
            document.getElementById("time-start").innerText = formatTime(startTime);
            document.getElementById("time-end").innerText = formatTime(endTime);

            buildPrintLayout();
        }

        // ================= CONSTRUCCIÓN DEL REPORTE PDF =================
        function buildPrintLayout() {
            const printArea = document.getElementById("print-area");
            
            let html = `
                <div class="print-header">
                    <h1>Evaluación de Redes de Computadoras</h1>
                    <div class="print-info">
                        <div><strong>Alumno:</strong> ${studentName}</div>
                        <div><strong>Aciertos:</strong> ${score} / 10</div>
                        <div><strong>Inicio:</strong> ${formatTime(startTime)}</div>
                        <div><strong>Término:</strong> ${formatTime(endTime)}</div>
                    </div>
                </div>
            `;

            questions.forEach((q, index) => {
                const userAns = userAnswers[index];
                const isCorrect = (userAns === q.correct);
                
                html += `<div class="print-question">`;
                html += `<div class="print-q-title">${index + 1}. ${q.q}</div>`;
                
                q.options.forEach((opt, optIndex) => {
                    let className = "print-opt";
                    let prefix = "[ &nbsp; ]";

                    if (optIndex === q.correct) {
                        className += " correct"; // La respuesta correcta siempre se marca
                        prefix = "[ ✔ ]";
                    }
                    
                    if (optIndex === userAns && !isCorrect) {
                        className += " wrong"; // Lo que marcó el usuario y estaba mal
                        prefix = "[ ✘ ]";
                    }

                    html += `<div class="${className}">${prefix} ${opt}</div>`;
                });
                
                html += `</div>`;
            });

            printArea.innerHTML = html;
        }
    </script>
</body>
</html>
